name: Build Release (Self-Contained .NET 10.0)

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Тег для релиза (например, 5.0.0-alpha)'
        required: true
        type: string
        default: 'v5.0.0-alpha'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

permissions:
  contents: write
  actions: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            runtime: win-x64
            artifact_name: dajet-metadata-win-x64
            archive_ext: zip
          - os: windows-2025
            runtime: win-arm64
            artifact_name: dajet-metadata-win-arm64
            archive_ext: zip
          - os: ubuntu-24.04
            runtime: linux-x64
            artifact_name: dajet-metadata-linux-x64
            archive_ext: tar.gz
          - os: ubuntu-24.04-arm
            runtime: linux-arm64
            artifact_name: dajet-metadata-linux-arm64
            archive_ext: tar.gz
          - os: macos-15
            runtime: osx-x64
            artifact_name: dajet-metadata-osx-x64
            archive_ext: tar.gz
          - os: macos-15
            runtime: osx-arm64
            artifact_name: dajet-metadata-osx-arm64
            archive_ext: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      # ─── Информация о раннере ───────────────────────────
      - name: "[INFO] Runner info"
        shell: bash
        run: |
          echo "============================================"
          echo "Runner OS: ${{ runner.os }}"
          echo "Runner Arch: ${{ runner.arch }}"
          echo "Matrix OS: ${{ matrix.os }}"
          echo "Matrix Runtime: ${{ matrix.runtime }}"
          echo "Artifact Name: ${{ matrix.artifact_name }}"
          echo "Archive Ext: ${{ matrix.archive_ext }}"
          echo "============================================"
          echo ""
          echo "System info:"
          uname -a 2>/dev/null || echo "Windows runner"
          echo ""
          echo "Disk space before:"
          df -h . 2>/dev/null || echo "Skipped on Windows"

      # ─── Checkout ───────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: "[INFO] Checkout info"
        shell: bash
        run: |
          echo "Checked out ref: $(git rev-parse HEAD)"
          echo "Branch: $(git branch --show-current)"
          echo "Tags: $(git tag --points-at HEAD)"

      # ─── Setup .NET ─────────────────────────────────────
      - name: Setup .NET 10.0 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'
          cache: true
          cache-dependency-path: |
            src/dajet-metadata/dajet-metadata.csproj
            src/dajet-data/dajet-data.csproj
            src/dajet-type-system/dajet-type-system.csproj

      - name: "[INFO] .NET info"
        run: |
          echo "============================================"
          echo ".NET SDK version:"
          dotnet --version
          echo ""
          echo ".NET runtimes:"
          dotnet --list-runtimes
          echo ""
          echo ".NET SDKs:"
          dotnet --list-sdks
          echo ""
          echo "DOTNET_ROOT: $DOTNET_ROOT"
          echo "============================================"

      # ─── Restore ────────────────────────────────────────
      - name: "[BUILD] Restore dependencies"
        run: |
          echo "Restoring packages for ${{ matrix.runtime }}..."
          dotnet restore src/dajet-metadata/dajet-metadata.csproj --runtime ${{ matrix.runtime }}

      # ─── Publish (Windows) ──────────────────────────────
      - name: "[BUILD] Publish (Windows)"
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "============================================"
          Write-Host "Publishing for runtime: ${{ matrix.runtime }}"
          Write-Host "Self-contained: true"
          Write-Host "PublishTrimmed: false"
          Write-Host "Output: ./publish/${{ matrix.artifact_name }}"
          Write-Host "============================================"

          dotnet publish src/dajet-metadata/dajet-metadata.csproj --configuration Release --runtime ${{ matrix.runtime }} --self-contained true -p:PublishTrimmed=false -p:DebugType=none -p:DebugSymbols=false --output ./publish/${{ matrix.artifact_name }}

          Write-Host ""
          $fileCount = (Get-ChildItem -Path ./publish/${{ matrix.artifact_name }} -File -Recurse).Count
          $sizeMB = [math]::Round(((Get-ChildItem -Path ./publish/${{ matrix.artifact_name }} -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB), 2)
          Write-Host "[INFO] Published files count: $fileCount"
          Write-Host "[INFO] Published size: $sizeMB MB"
          Write-Host "[INFO] Root files:"
          Get-ChildItem -Path ./publish/${{ matrix.artifact_name }} -File | ForEach-Object { Write-Host "  $($_.Name)" }

      # ─── Publish (Unix) ─────────────────────────────────
      - name: "[BUILD] Publish (Unix)"
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "============================================"
          echo "Publishing for runtime: ${{ matrix.runtime }}"
          echo "Self-contained: true"
          echo "PublishTrimmed: false"
          echo "Output: ./publish/${{ matrix.artifact_name }}"
          echo "============================================"

          dotnet publish src/dajet-metadata/dajet-metadata.csproj \
            --configuration Release \
            --runtime ${{ matrix.runtime }} \
            --self-contained true \
            -p:PublishTrimmed=false \
            -p:DebugType=none \
            -p:DebugSymbols=false \
            --output ./publish/${{ matrix.artifact_name }}

          echo ""
          echo "[INFO] Published files count: $(find ./publish/${{ matrix.artifact_name }} -type f 2>/dev/null | wc -l)"
          echo "[INFO] Published size: $(du -sh ./publish/${{ matrix.artifact_name }} 2>/dev/null | cut -f1)"
          echo "[INFO] Root files:"
          ls -la ./publish/${{ matrix.artifact_name }}/

      # ─── Копирование shared/ и host/ (Windows) ──────────
      - name: "[RUNTIME] Copy shared/ and host/ (Windows)"
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "============================================"
          Write-Host "Copying .NET Runtime as shared/Microsoft.NETCore.App"
          Write-Host "============================================"

          $dotnetRoot = "$env:ProgramFiles\dotnet"
          $runtimeVersion = Get-ChildItem "$dotnetRoot\shared\Microsoft.NETCore.App" | 
            Where-Object { $_.Name -like "10.0.*" } | 
            Sort-Object Name -Descending | 
            Select-Object -First 1
          Write-Host "Runtime version: $($runtimeVersion.Name)"

          $dest = ".\publish\${{ matrix.artifact_name }}\shared\Microsoft.NETCore.App\$($runtimeVersion.Name)"
          New-Item -ItemType Directory -Force -Path $dest
          Copy-Item -Path "$dotnetRoot\shared\Microsoft.NETCore.App\$($runtimeVersion.Name)\*" -Destination $dest -Recurse -Force
          Write-Host "[OK] Runtime copied to shared/Microsoft.NETCore.App/$($runtimeVersion.Name)"

          $fxrSource = "$dotnetRoot\host\fxr\$($runtimeVersion.Name)"
          if (Test-Path $fxrSource) {
            $fxrDest = ".\publish\${{ matrix.artifact_name }}\host\fxr\$($runtimeVersion.Name)"
            New-Item -ItemType Directory -Force -Path $fxrDest
            Copy-Item -Path "$fxrSource\*" -Destination $fxrDest -Recurse -Force
            Write-Host "[OK] Hostfxr copied to host/fxr/$($runtimeVersion.Name)"
          } else {
            Write-Host "[WARN] Hostfxr not found at: $fxrSource"
          }

      # ─── Копирование shared/ и host/ (Unix) ─────────────
      - name: "[RUNTIME] Copy shared/ and host/ (Unix)"
        if: runner.os != 'Windows'
        run: |
          echo "============================================"
          echo "Copying .NET Runtime as shared/Microsoft.NETCore.App"
          echo "============================================"

          DOTNET_ROOT="${DOTNET_ROOT:-$(dirname $(readlink -f $(which dotnet)))}"
          RUNTIME_VERSION=$(ls "$DOTNET_ROOT/shared/Microsoft.NETCore.App" | grep "^10.0." | sort -V | tail -1)
          echo "Runtime version: $RUNTIME_VERSION"

          DEST="./publish/${{ matrix.artifact_name }}/shared/Microsoft.NETCore.App/$RUNTIME_VERSION"
          mkdir -p "$DEST"
          cp -r "$DOTNET_ROOT/shared/Microsoft.NETCore.App/$RUNTIME_VERSION/"* "$DEST/"
          echo "[OK] Runtime copied to shared/Microsoft.NETCore.App/$RUNTIME_VERSION"

          FXR_SOURCE="$DOTNET_ROOT/host/fxr/$RUNTIME_VERSION"
          if [ -d "$FXR_SOURCE" ]; then
            FXR_DEST="./publish/${{ matrix.artifact_name }}/host/fxr/$RUNTIME_VERSION"
            mkdir -p "$FXR_DEST"
            cp -r "$FXR_SOURCE/"* "$FXR_DEST/"
            echo "[OK] Hostfxr copied to host/fxr/$RUNTIME_VERSION"
          else
            echo "[WARN] Hostfxr not found at: $FXR_SOURCE"
          fi

      # ─── Очистка дубликатов (Windows) ───────────────────
      - name: "[CLEAN] Remove duplicate runtime files (Windows)"
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "============================================"
          Write-Host "Removing duplicate runtime files from root"
          Write-Host "============================================"
          
          $root = ".\publish\${{ matrix.artifact_name }}"
          
          # 1. Все System.*.dll — только в shared/
          $system = Get-ChildItem -Path $root -File | Where-Object { $_.Name -like "System.*.dll" -or $_.Name -eq "System.dll" }
          Write-Host "[CLEAN] Removing $($system.Count) System.*.dll files..."
          $system | ForEach-Object { Write-Host "  $_" }
          $system | Remove-Item -Force
          
          # 2. Microsoft.* runtime DLL (не NuGet-зависимости!)
          $msRuntime = Get-ChildItem -Path $root -File | Where-Object {
            $_.Name -in @(
              "Microsoft.CSharp.dll",
              "Microsoft.VisualBasic.Core.dll",
              "Microsoft.VisualBasic.dll",
              "Microsoft.Win32.Primitives.dll",
              "Microsoft.Win32.Registry.dll"
            )
          }
          Write-Host "[CLEAN] Removing $($msRuntime.Count) Microsoft.* runtime files..."
          $msRuntime | ForEach-Object { Write-Host "  $_" }
          $msRuntime | Remove-Item -Force
          
          # 3. netstandard.dll, mscorlib.dll, WindowsBase.dll
          $otherRuntime = Get-ChildItem -Path $root -File | Where-Object {
            $_.Name -in @("netstandard.dll", "mscorlib.dll", "WindowsBase.dll")
          }
          Write-Host "[CLEAN] Removing $($otherRuntime.Count) other runtime files..."
          $otherRuntime | ForEach-Object { Write-Host "  $_" }
          $otherRuntime | Remove-Item -Force
          
          # 4. Нативные runtime DLL
          $native = Get-ChildItem -Path $root -File | Where-Object {
            $_.Name -in @(
              "coreclr.dll", "clrjit.dll", "clrgc.dll", "clrgcexp.dll", "clretwrc.dll",
              "hostpolicy.dll", "mscorrc.dll", "msquic.dll", "createdump.exe"
            )
          }
          Write-Host "[CLEAN] Removing $($native.Count) native runtime files..."
          $native | ForEach-Object { Write-Host "  $_" }
          $native | Remove-Item -Force
          
          # 5. mscordaccore*.dll, mscordbi.dll
          $diag = Get-ChildItem -Path $root -File | Where-Object { $_.Name -like "mscordaccore*.dll" -or $_.Name -eq "mscordbi.dll" }
          Write-Host "[CLEAN] Removing $($diag.Count) diagnostic runtime files..."
          $diag | ForEach-Object { Write-Host "  $_" }
          $diag | Remove-Item -Force
          
          # 6. Служебные файлы
          $svc = Get-ChildItem -Path $root -File | Where-Object {
            $_.Name -in @(".version", "Microsoft.NETCore.App.deps.json", "Microsoft.NETCore.App.runtimeconfig.json")
          }
          Write-Host "[CLEAN] Removing $($svc.Count) service files..."
          $svc | ForEach-Object { Write-Host "  $_" }
          $svc | Remove-Item -Force
          
          Write-Host ""
          Write-Host "[INFO] Remaining files in root:"
          Get-ChildItem -Path $root -File | ForEach-Object { Write-Host "  $($_.Name)" }

      # ─── Очистка дубликатов (Unix) ──────────────────────
      - name: "[CLEAN] Remove duplicate runtime files (Unix)"
        if: runner.os != 'Windows'
        run: |
          echo "============================================"
          echo "Removing duplicate runtime files from root"
          echo "============================================"
          
          ROOT="./publish/${{ matrix.artifact_name }}"
          
          # 1. System.*.dll/.so/.dylib
          echo "[CLEAN] Removing System.* files..."
          find "$ROOT" -maxdepth 1 -type f \( -name "System.*.dll" -o -name "System.*.so" -o -name "System.*.dylib" -o -name "System.dll" \) -delete -print
          
          # 2. Microsoft.* runtime DLL (не NuGet-зависимости)
          echo "[CLEAN] Removing Microsoft.* runtime files..."
          find "$ROOT" -maxdepth 1 -type f \( \
            -name "Microsoft.CSharp.dll" -o \
            -name "Microsoft.VisualBasic.Core.dll" -o \
            -name "Microsoft.VisualBasic.dll" -o \
            -name "Microsoft.Win32.Primitives.dll" -o \
            -name "Microsoft.Win32.Registry.dll" \
          \) -delete -print
          
          # 3. netstandard.dll, mscorlib.dll, WindowsBase.dll
          echo "[CLEAN] Removing netstandard/mscorlib/WindowsBase..."
          find "$ROOT" -maxdepth 1 -type f \( -name "netstandard.dll" -o -name "mscorlib.dll" -o -name "WindowsBase.dll" \) -delete -print
          
          # 4. Нативные библиотеки
          echo "[CLEAN] Removing native runtime libraries..."
          find "$ROOT" -maxdepth 1 -type f \( \
            -name "libcoreclr.*" -o \
            -name "libclrjit.*" -o \
            -name "libclrgc.*" -o \
            -name "libclrgcexp.*" -o \
            -name "libhostpolicy.*" -o \
            -name "libcoreclrtraceptprovider.*" -o \
            -name "libmscordaccore.*" -o \
            -name "libmscordbi.*" -o \
            -name "createdump" \
          \) -delete -print
          
          # 5. Служебные файлы
          echo "[CLEAN] Removing service files..."
          find "$ROOT" -maxdepth 1 -type f \( -name ".version" -o -name "Microsoft.NETCore.App.deps.json" -o -name "Microsoft.NETCore.App.runtimeconfig.json" \) -delete -print
          
          echo ""
          echo "[INFO] Remaining files in root:"
          ls -la "$ROOT"

      # ─── runtimeconfig.json (Windows) ────────────────────
      - name: "[CONFIG] Create runtimeconfig.json (Windows)"
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "============================================"
          Write-Host "Creating runtimeconfig.json"
          Write-Host "============================================"

          $dotnetRoot = "$env:ProgramFiles\dotnet"
          $runtimeVersion = Get-ChildItem "$dotnetRoot\shared\Microsoft.NETCore.App" | 
            Where-Object { $_.Name -like "10.0.*" } | 
            Sort-Object Name -Descending | 
            Select-Object -First 1

          Write-Host "Runtime version for config: $($runtimeVersion.Name)"

          $runtimeconfig = @"
          {
            "runtimeOptions": {
              "tfm": "net10.0",
              "frameworks": [
                {
                  "name": "Microsoft.NETCore.App",
                  "version": "$($runtimeVersion.Name)"
                }
              ],
              "configProperties": {
                "System.GC.Server": true,
                "System.Reflection.Metadata.MetadataUpdater.IsSupported": false,
                "System.Runtime.Serialization.EnableUnsafeBinaryFormatterSerialization": false
              }
            }
          }
          "@

          $configPath = ".\publish\${{ matrix.artifact_name }}\DaJet.Metadata.runtimeconfig.json"
          $runtimeconfig | Out-File -FilePath $configPath -Encoding utf8

          Write-Host "[OK] Created: $configPath"
          Write-Host "Content:"
          Get-Content $configPath | Write-Host

      # ─── runtimeconfig.json (Unix) ───────────────────────
      - name: "[CONFIG] Create runtimeconfig.json (Unix)"
        if: runner.os != 'Windows'
        run: |
          echo "============================================"
          echo "Creating runtimeconfig.json"
          echo "============================================"

          RUNTIME_VERSION=$(ls "$DOTNET_ROOT/shared/Microsoft.NETCore.App" | grep "^10.0." | sort -V | tail -1)
          echo "Runtime version for config: $RUNTIME_VERSION"

          CONFIG_PATH="./publish/${{ matrix.artifact_name }}/DaJet.Metadata.runtimeconfig.json"

          cat > "$CONFIG_PATH" << EOF
          {
            "runtimeOptions": {
              "tfm": "net10.0",
              "frameworks": [
                {
                  "name": "Microsoft.NETCore.App",
                  "version": "$RUNTIME_VERSION"
                }
              ],
              "configProperties": {
                "System.GC.Server": true,
                "System.Reflection.Metadata.MetadataUpdater.IsSupported": false,
                "System.Runtime.Serialization.EnableUnsafeBinaryFormatterSerialization": false
              }
            }
          }
          EOF

          echo "[OK] Created: $CONFIG_PATH"
          echo "Content:"
          cat "$CONFIG_PATH"

      # ─── Сводка перед архивацией ─────────────────────────
      - name: "[INFO] Publish summary"
        shell: bash
        run: |
          echo "============================================"
          echo "Publish summary for ${{ matrix.artifact_name }}"
          echo "============================================"
          echo "Total files: $(find ./publish/${{ matrix.artifact_name }} -type f 2>/dev/null | wc -l)"
          echo "Total size: $(du -sh ./publish/${{ matrix.artifact_name }} 2>/dev/null | cut -f1)"
          echo ""
          echo "Root contents:"
          ls -la ./publish/${{ matrix.artifact_name }} 2>/dev/null || echo "Cannot list"
          echo ""
          echo "shared folder:"
          if [ -d "./publish/${{ matrix.artifact_name }}/shared/Microsoft.NETCore.App" ]; then
            echo "  [OK] shared/Microsoft.NETCore.App exists"
            ls "./publish/${{ matrix.artifact_name }}/shared/Microsoft.NETCore.App/"
          else
            echo "  [MISS] shared/Microsoft.NETCore.App NOT FOUND"
          fi
          echo ""
          echo "Key files:"
          for f in "DaJet.Metadata.dll" "hostfxr.dll" "libhostfxr.so" "libhostfxr.dylib" "DaJet.Metadata.runtimeconfig.json"; do
            if find ./publish/${{ matrix.artifact_name }} -name "$f" 2>/dev/null | head -1 > /dev/null; then
              echo "  [OK] $f"
            else
              echo "  [MISS] $f"
            fi
          done

      # ─── Архив (Windows) ─────────────────────────────────
      - name: "[ARCHIVE] Create ZIP (Windows)"
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "============================================"
          Write-Host "Creating ZIP archive"
          Write-Host "============================================"

          $archivePath = "./publish/${{ matrix.artifact_name }}.zip"
          $sourcePath = "./publish/${{ matrix.artifact_name }}"

          Write-Host "Source: $sourcePath"
          Write-Host "Archive: $archivePath"

          Compress-Archive -Path "$sourcePath\*" -DestinationPath $archivePath -Force

          $archiveSize = (Get-Item $archivePath).Length
          Write-Host "[OK] Archive created: $archivePath ($([math]::Round($archiveSize/1MB, 2)) MB)"

      # ─── Архив (Unix) ────────────────────────────────────
      - name: "[ARCHIVE] Create tar.gz (Unix)"
        if: runner.os != 'Windows'
        run: |
          echo "============================================"
          echo "Creating tar.gz archive"
          echo "============================================"

          cd ./publish

          ARCHIVE_NAME="${{ matrix.artifact_name }}.tar.gz"
          SOURCE_DIR="${{ matrix.artifact_name }}"

          echo "Source: $SOURCE_DIR"
          echo "Archive: $ARCHIVE_NAME"

          tar -czf "$ARCHIVE_NAME" "$SOURCE_DIR"

          ARCHIVE_SIZE=$(stat -c%s "$ARCHIVE_NAME" 2>/dev/null || stat -f%z "$ARCHIVE_NAME" 2>/dev/null)
          echo "[OK] Archive created: $ARCHIVE_NAME ($(echo "scale=2; $ARCHIVE_SIZE/1024/1024" | bc 2>/dev/null || echo "unknown") MB)"

      # ─── Загрузка артефакта ──────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ./publish/${{ matrix.artifact_name }}.${{ matrix.archive_ext }}
          retention-days: 30

      - name: "[DONE] Job completed"
        shell: bash
        run: |
          echo "============================================"
          echo "[OK] Job completed for ${{ matrix.artifact_name }}"
          echo "============================================"

  release:
    needs: build
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - name: "[INFO] Release info"
        run: |
          echo "============================================"
          echo "Creating release"
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "============================================"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: "[INFO] Artifacts structure"
        run: |
          echo "Downloaded artifacts:"
          find ./artifacts -type f -exec ls -lh {} \;

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG"

      - name: Delete existing release if any
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          echo "Checking for existing release with tag: $TAG"

          RESPONSE=$(curl -s -w "\n%{http_code}" -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ]; then
            RELEASE_ID=$(echo "$BODY" | grep -o '"id": [0-9]*' | head -1 | grep -o '[0-9]*')
            if [ -n "$RELEASE_ID" ]; then
              echo "Deleting existing release ID: $RELEASE_ID"
              curl -s -X DELETE -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID"
              echo "[OK] Existing release deleted"
            fi
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "No existing release found (404)"
          else
            echo "Unexpected HTTP status: $HTTP_CODE"
            echo "Response: $BODY"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          body: |
            ## DaJet Metadata — Self-Contained .NET 10.0

            Full .NET Runtime included in `shared/Microsoft.NETCore.App/`.

            ### Platforms
            | Platform | Architecture |
            |---|---|
            | Windows | x64, ARM64 |
            | Linux | x64, ARM64 |
            | macOS | x64, ARM64 (Apple Silicon) |

            ### Structure
            ```
            win-x64/
            ├── DaJet.Metadata.dll
            ├── DaJet.Data.dll
            ├── DaJet.TypeSystem.dll
            ├── Npgsql.dll
            ├── Microsoft.Data.SqlClient.dll
            ├── Azure.*.dll
            ├── Microsoft.Extensions.*.dll
            ├── host/
            │   └── fxr/
            │       └── 10.0.x/
            │           └── hostfxr.dll
            └── shared/
                └── Microsoft.NETCore.App/
                    └── 10.0.x/
                        └── (runtime files)
            ```

            ### For pythonnet
            No duplicate runtime files. NuGet dependencies kept in root.
            All System.*.dll and runtime binaries are only in `shared/`.
          files: |
            ./artifacts/*.zip
            ./artifacts/*.tar.gz
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, 'alpha') || contains(steps.tag.outputs.tag, 'beta') }}
          generate_release_notes: true

      - name: "[DONE] Release URL"
        run: |
          echo "============================================"
          echo "[OK] Release created!"
          echo "URL: https://github.com/${{ github.repository }}/releases/tag/${{ steps.tag.outputs.tag }}"
          echo "============================================"
