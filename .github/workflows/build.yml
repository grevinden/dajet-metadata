name: Build Release (Self-Contained .NET 10.0)

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:
    inputs:
      version_suffix:
        description: 'Суффикс версии (например, beta.1)'
        required: false
        default: ''

permissions:
  contents: write
  actions: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Windows ---
          - os: windows-latest
            runtime: win-x64
            artifact_name: dajet-metadata-win-x64
            archive_ext: zip
          - os: windows-latest
            runtime: win-arm64
            artifact_name: dajet-metadata-win-arm64
            archive_ext: zip

          # --- Linux ---
          - os: ubuntu-latest
            runtime: linux-x64
            artifact_name: dajet-metadata-linux-x64
            archive_ext: tar.gz
          - os: ubuntu-latest
            runtime: linux-arm64
            artifact_name: dajet-metadata-linux-arm64
            archive_ext: tar.gz

          # --- macOS ---
          - os: macos-latest
            runtime: osx-x64
            artifact_name: dajet-metadata-osx-x64
            archive_ext: tar.gz
          - os: macos-latest
            runtime: osx-arm64
            artifact_name: dajet-metadata-osx-arm64
            archive_ext: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10.0 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Print .NET version
        run: dotnet --info

      - name: Restore dependencies
        run: dotnet restore src/dajet-metadata/dajet-metadata.csproj

      - name: Publish self-contained app
        run: >
          dotnet publish src/dajet-metadata/dajet-metadata.csproj
          --configuration Release
          --runtime ${{ matrix.runtime }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishTrimmed=false
          -p:DebugType=none
          -p:DebugSymbols=false
          -p:UseSystemResourceKeys=true
          -p:SatelliteResourceLanguages=en
          --output ./publish/${{ matrix.artifact_name }}

      - name: Create archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "./publish/${{ matrix.artifact_name }}/*" `
            -DestinationPath "./publish/${{ matrix.artifact_name }}.${{ matrix.archive_ext }}"

      - name: Create archive (Linux/Mac)
        if: matrix.os != 'windows-latest'
        run: |
          cd ./publish
          tar -czf "${{ matrix.artifact_name }}.${{ matrix.archive_ext }}" "${{ matrix.artifact_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ./publish/${{ matrix.artifact_name }}.${{ matrix.archive_ext }}
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Display structure
        run: ls -R ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## 📦 Сборка библиотеки DaJet Metadata
            - .NET 10.0 self-contained
            - Архитектуры: x64, ARM64
            - Платформы: Windows, Linux, macOS
            - PublishTrimmed: false (максимальная надёжность)

            | Платформа | Архитектура |
            |---|---|
            | Windows | x64, ARM64 |
            | Linux | x64, ARM64 |
            | macOS | x64, ARM64 (Apple Silicon) |
          files: ./artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
