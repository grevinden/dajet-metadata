name: Build Release (Self-Contained .NET 10.0)

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Тег для релиза (например, 5.0.0-alpha)'
        required: true
        type: string
        default: '5.0.0-alpha'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

permissions:
  contents: write
  actions: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            runtime: win-x64
            artifact_name: dajet-metadata-win-x64
            archive_ext: zip
          - os: windows-2025
            runtime: win-arm64
            artifact_name: dajet-metadata-win-arm64
            archive_ext: zip
          - os: ubuntu-24.04
            runtime: linux-x64
            artifact_name: dajet-metadata-linux-x64
            archive_ext: tar.gz
          - os: ubuntu-24.04-arm
            runtime: linux-arm64
            artifact_name: dajet-metadata-linux-arm64
            archive_ext: tar.gz
          - os: macos-15
            runtime: osx-x64
            artifact_name: dajet-metadata-osx-x64
            archive_ext: tar.gz
          - os: macos-15
            runtime: osx-arm64
            artifact_name: dajet-metadata-osx-arm64
            archive_ext: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup .NET 10.0 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'
          cache: true
          cache-dependency-path: |
            src/dajet-metadata/dajet-metadata.csproj
            src/dajet-data/dajet-data.csproj
            src/dajet-type-system/dajet-type-system.csproj

      - name: Restore dependencies
        run: dotnet restore src/dajet-metadata/dajet-metadata.csproj --runtime ${{ matrix.runtime }}

      - name: Publish library (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          dotnet publish src/dajet-metadata/dajet-metadata.csproj `
            --configuration Release `
            --runtime ${{ matrix.runtime }} `
            --self-contained true `
            -p:PublishTrimmed=false `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            --output ./publish/${{ matrix.artifact_name }}

      - name: Publish library (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          dotnet publish src/dajet-metadata/dajet-metadata.csproj \
            --configuration Release \
            --runtime ${{ matrix.runtime }} \
            --self-contained true \
            -p:PublishTrimmed=false \
            -p:DebugType=none \
            -p:DebugSymbols=false \
            --output ./publish/${{ matrix.artifact_name }}

      # --- Копирование shared/Microsoft.NETCore.App/10.0.x ---
      - name: Copy .NET Runtime as shared folder (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dotnetRoot = "$env:ProgramFiles\dotnet"
          $runtimeVersion = Get-ChildItem "$dotnetRoot\shared\Microsoft.NETCore.App" | 
            Where-Object { $_.Name -like "10.0.*" } | 
            Sort-Object Name -Descending | 
            Select-Object -First 1
          
          $dest = ".\publish\${{ matrix.artifact_name }}\shared\Microsoft.NETCore.App\$($runtimeVersion.Name)"
          New-Item -ItemType Directory -Force -Path $dest
          Copy-Item -Path "$dotnetRoot\shared\Microsoft.NETCore.App\$($runtimeVersion.Name)\*" -Destination $dest -Recurse -Force
          
          # Hostfxr
          $fxrSource = "$dotnetRoot\host\fxr\$($runtimeVersion.Name)"
          if (Test-Path $fxrSource) {
            $fxrDest = ".\publish\${{ matrix.artifact_name }}\host\fxr\$($runtimeVersion.Name)"
            New-Item -ItemType Directory -Force -Path $fxrDest
            Copy-Item -Path "$fxrSource\*" -Destination $fxrDest -Recurse -Force
          }

      - name: Copy .NET Runtime as shared folder (Unix)
        if: runner.os != 'Windows'
        run: |
          DOTNET_ROOT="${DOTNET_ROOT:-$(dirname $(readlink -f $(which dotnet)))}"
          RUNTIME_VERSION=$(ls "$DOTNET_ROOT/shared/Microsoft.NETCore.App" | grep "^10.0." | sort -V | tail -1)
          
          DEST="./publish/${{ matrix.artifact_name }}/shared/Microsoft.NETCore.App/$RUNTIME_VERSION"
          mkdir -p "$DEST"
          cp -r "$DOTNET_ROOT/shared/Microsoft.NETCore.App/$RUNTIME_VERSION/"* "$DEST/"
          
          FXR_SOURCE="$DOTNET_ROOT/host/fxr/$RUNTIME_VERSION"
          if [ -d "$FXR_SOURCE" ]; then
            FXR_DEST="./publish/${{ matrix.artifact_name }}/host/fxr/$RUNTIME_VERSION"
            mkdir -p "$FXR_DEST"
            cp -r "$FXR_SOURCE/"* "$FXR_DEST/"
          fi

      # --- Очистка дубликатов: удаляем runtime-файлы из корня ---
      - name: Remove duplicate runtime files from root (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $root = ".\publish\${{ matrix.artifact_name }}"
          
          # Удаляем все System.*.dll из корня (они уже в shared/)
          Get-ChildItem -Path $root -File | Where-Object {
            $_.Name -like "System.*.dll"
          } | Remove-Item -Force
          
          # Удаляем Microsoft.*.dll из корня, кроме DaJet.* и Microsoft.Data.*
          Get-ChildItem -Path $root -File | Where-Object {
            $_.Name -like "Microsoft.*.dll" -and 
            $_.Name -notlike "DaJet.*" -and 
            $_.Name -notlike "Microsoft.Data.*"
          } | Remove-Item -Force
          
          # Удаляем netstandard.dll, mscorlib.dll, WindowsBase.dll из корня
          Get-ChildItem -Path $root -File | Where-Object {
            $_.Name -in @("netstandard.dll", "mscorlib.dll", "WindowsBase.dll", "mscorrc.dll", "msquic.dll")
          } | Remove-Item -Force
          
          # Удаляем runtime-файлы из корня: coreclr.dll, clrjit.dll, clrgc.dll, clretwrc.dll, mscordaccore.dll, mscordbi.dll
          Get-ChildItem -Path $root -File | Where-Object {
            $_.Name -in @("coreclr.dll", "clrjit.dll", "clrgc.dll", "clrgcexp.dll", "clretwrc.dll", "mscordaccore.dll", "mscordaccore_*.dll", "mscordbi.dll", "hostpolicy.dll")
          } | Remove-Item -Force
          
          # Удаляем createdump.exe из корня
          Get-ChildItem -Path $root -File | Where-Object {
            $_.Name -eq "createdump.exe"
          } | Remove-Item -Force
          
          # Удаляем .version, Microsoft.NETCore.App.deps.json, Microsoft.NETCore.App.runtimeconfig.json
          Get-ChildItem -Path $root -File | Where-Object {
            $_.Name -in @(".version", "Microsoft.NETCore.App.deps.json", "Microsoft.NETCore.App.runtimeconfig.json")
          } | Remove-Item -Force

      - name: Remove duplicate runtime files from root (Unix)
        if: runner.os != 'Windows'
        run: |
          ROOT="./publish/${{ matrix.artifact_name }}"
          
          # Удаляем System.*.dll из корня
          find "$ROOT" -maxdepth 1 -type f -name "System.*.dll" -delete
          
          # Удаляем Microsoft.*.dll из корня, кроме DaJet.* и Microsoft.Data.*
          find "$ROOT" -maxdepth 1 -type f -name "Microsoft.*.dll" ! -name "DaJet.*" ! -name "Microsoft.Data.*" -delete
          
          # Удаляем netstandard.dll, mscorlib.dll, WindowsBase.dll
          find "$ROOT" -maxdepth 1 -type f \( -name "netstandard.dll" -o -name "mscorlib.dll" -o -name "WindowsBase.dll" \) -delete
          
          # Удаляем нативные .so/.dylib из корня
          find "$ROOT" -maxdepth 1 -type f \( -name "libcoreclr.*" -o -name "libclrjit.*" -o -name "libclrgc.*" -o -name "libclrgcexp.*" -o -name "libmscordaccore.*" -o -name "libmscordbi.*" -o -name "libhostpolicy.*" -o -name "libcoreclrtraceptprovider.*" \) -delete
          
          # Удаляем createdump
          find "$ROOT" -maxdepth 1 -type f -name "createdump" -delete
          
          # Удаляем служебные файлы runtime
          find "$ROOT" -maxdepth 1 -type f \( -name ".version" -o -name "Microsoft.NETCore.App.deps.json" -o -name "Microsoft.NETCore.App.runtimeconfig.json" \) -delete

      # --- Создание runtimeconfig.json ---
      - name: Create runtimeconfig.json (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $runtimeVersion = Get-ChildItem "$env:ProgramFiles\dotnet\shared\Microsoft.NETCore.App" | 
            Where-Object { $_.Name -like "10.0.*" } | 
            Sort-Object Name -Descending | 
            Select-Object -First 1
          
          $runtimeconfig = @"
          {
            "runtimeOptions": {
              "tfm": "net10.0",
              "frameworks": [
                {
                  "name": "Microsoft.NETCore.App",
                  "version": "$($runtimeVersion.Name)"
                }
              ],
              "configProperties": {
                "System.GC.Server": true,
                "System.Reflection.Metadata.MetadataUpdater.IsSupported": false,
                "System.Runtime.Serialization.EnableUnsafeBinaryFormatterSerialization": false
              }
            }
          }
          "@
          
          $runtimeconfig | Out-File -FilePath ".\publish\${{ matrix.artifact_name }}\DaJet.Metadata.runtimeconfig.json" -Encoding utf8

      - name: Create runtimeconfig.json (Unix)
        if: runner.os != 'Windows'
        run: |
          RUNTIME_VERSION=$(ls "$DOTNET_ROOT/shared/Microsoft.NETCore.App" | grep "^10.0." | sort -V | tail -1)
          
          cat > "./publish/${{ matrix.artifact_name }}/DaJet.Metadata.runtimeconfig.json" << EOF
          {
            "runtimeOptions": {
              "tfm": "net10.0",
              "frameworks": [
                {
                  "name": "Microsoft.NETCore.App",
                  "version": "$RUNTIME_VERSION"
                }
              ],
              "configProperties": {
                "System.GC.Server": true,
                "System.Reflection.Metadata.MetadataUpdater.IsSupported": false,
                "System.Runtime.Serialization.EnableUnsafeBinaryFormatterSerialization": false
              }
            }
          }
          EOF

      # --- Создание архива ---
      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path ".\publish\${{ matrix.artifact_name }}\*" -DestinationPath ".\publish\${{ matrix.artifact_name }}.zip" -Force

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          cd ./publish
          tar -czf "${{ matrix.artifact_name }}.tar.gz" "${{ matrix.artifact_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ./publish/${{ matrix.artifact_name }}.${{ matrix.archive_ext }}
          retention-days: 30

  release:
    needs: build
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Delete existing release if any
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          RESPONSE=$(curl -s -w "\n%{http_code}" -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          if [ "$HTTP_CODE" = "200" ]; then
            RELEASE_ID=$(echo "$BODY" | grep -o '"id": [0-9]*' | head -1 | grep -o '[0-9]*')
            if [ -n "$RELEASE_ID" ]; then
              echo "Deleting existing release ID: $RELEASE_ID"
              curl -s -X DELETE -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID"
            fi
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          body: |
            ## DaJet Metadata — Self-Contained .NET 10.0
            
            Full .NET Runtime included in `shared/Microsoft.NETCore.App/`.
            
            ### Platforms
            | Platform | Architecture |
            |---|---|
            | Windows | x64, ARM64 |
            | Linux | x64, ARM64 |
            | macOS | x64, ARM64 (Apple Silicon) |
            
            ### Structure
            ```
            win-x64/
            ├── DaJet.Metadata.dll
            ├── DaJet.Data.dll
            ├── DaJet.TypeSystem.dll
            ├── Npgsql.dll
            ├── Microsoft.Data.SqlClient.dll
            ├── Azure.*.dll
            ├── host/
            │   └── fxr/
            │       └── 10.0.x/
            │           └── hostfxr.dll
            └── shared/
                └── Microsoft.NETCore.App/
                    └── 10.0.x/
                        └── (runtime files)
            ```
            
            ### For pythonnet
            No duplicate runtime files. All System.*.dll and runtime binaries are only in `shared/`.
          files: |
            ./artifacts/*.zip
            ./artifacts/*.tar.gz
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, 'alpha') || contains(steps.tag.outputs.tag, 'beta') }}
          generate_release_notes: true